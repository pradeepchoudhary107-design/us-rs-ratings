name: US Market RS Rating Scan

on:
  schedule:
    # Saturday 10:00 AM IST = Saturday 04:30 UTC
    - cron: "30 4 * * 6"
  workflow_dispatch:

jobs:
  scan-and-email:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install libraries
        run: pip install yfinance pandas requests openpyxl

      - name: Run US RS Scanner + Send Email
        env:
          EMAIL_SENDER:   ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
        run: python us_scan.py

      - name: Commit updated data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --staged --quiet || git commit -m "US RS update: $(date -u '+%d %b %Y')"
          git push
