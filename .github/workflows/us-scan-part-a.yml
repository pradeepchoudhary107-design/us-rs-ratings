name: US RS Scan — Part A

on:
  schedule:
    # Saturday 8:00 AM IST = Saturday 02:30 UTC
    - cron: "30 2 * * 6"
  workflow_dispatch:

jobs:
  scan-part-a:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install libraries
        run: pip install yfinance pandas requests openpyxl

      - name: Run Part A Scanner
        run: python us_scan_a.py

      - name: Commit data_a.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data_a.json
          git diff --staged --quiet || git commit -m "US RS Part A: $(date -u '+%d %b %Y')"
          git push
